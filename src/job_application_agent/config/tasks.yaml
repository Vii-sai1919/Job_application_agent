job_research_task:
  description: >
    Search for the current job posting for the role "{role}" at "{company}".
    Extract and return:
    - The full list of required skills and qualifications
    - Key responsibilities
    - Any preferred skills or nice-to-haves
    - Important keywords used in the posting
    If you cannot find the exact posting, find the most similar recent one.
  expected_output: >
    A structured summary of the job requirements, responsibilities, and keywords.

company_research_task:
  description: >
    Research "{company}" thoroughly. Find and return:
    - What the company does and its core mission
    - Engineering culture and values
    - Current tech stack
    - Recent news or product launches in the last 6 months
    - Any notable facts that would impress a recruiter if referenced in a cover letter
  expected_output: >
    A detailed company profile covering culture, stack, recent news, and talking points.

hire_pattern_task:
  description: >
    Search the web for people recently hired as {role} at {company}. Find at least 3 profiles.
    Identify common patterns:
    - Educational backgrounds
    - Prior experience types
    - Common skills and certifications
    - Career trajectories that led to this role
  expected_output: >
    A summary of hiring patterns and what profile traits are most common for this role at this company.

resume_tailor_task:
  description: >
    Read the candidate's resume from this file path: {resume_path}
    Using the job requirements and company research from previous tasks, rewrite the resume to:
    - Incorporate important keywords from the job posting naturally
    - Bring the most relevant experience to the top
    - Reframe bullet points to match what the company is looking for
    - Keep it honest — do not invent experience
    Return the complete rewritten resume as clean text.
  expected_output: >
    A complete rewritten resume tailored for the role, formatted as clean text.



cover_letter_task:
  description: >
    Write a cover letter for the "{role}" position at "{company}".
    Use the job requirements, company research, and tailored resume from previous tasks.

    YOU MUST FOLLOW THESE RULES STRICTLY:
    - Exactly 3 paragraphs, no more, no less
    - Paragraph 1: Who you are and why this specific company excites you — reference ONE real specific detail from the company research (a product, initiative, or value — not generic praise)
    - Paragraph 2: Your two strongest technical qualifications that directly match the top JD requirements — be specific, use numbers or outcomes where possible
    - Paragraph 3: One sentence on what you bring beyond technical skills, then a clear call to action

    DO NOT use filler phrases like "I am thrilled", "I am passionate", "I would be a great fit".
    DO NOT exceed 250 words total.
    DO NOT write anything before or after the letter itself.
  expected_output: >
    A cover letter of exactly 3 paragraphs and under 250 words, ready to send.


gap_analysis_task:
  description: >
    Compare the candidate's original resume against the job requirements for "{role}" at "{company}".

    YOU MUST RETURN EXACTLY THIS STRUCTURE — nothing more, nothing less:

    MATCH SCORES
    Current Match Score: [X]%
    Optimized Match Score: [Y]%
    Score Reasoning: [2 sentences explaining the scores]

    TOP 5 GAPS
    1. [Gap name]: [One sentence describing the gap]
       Action: [One specific course, project, or certification to address it]
    2. [Gap name]: [One sentence describing the gap]
       Action: [One specific course, project, or certification to address it]
    3. [Gap name]: [One sentence describing the gap]
       Action: [One specific course, project, or certification to address it]
    4. [Gap name]: [One sentence describing the gap]
       Action: [One specific course, project, or certification to address it]
    5. [Gap name]: [One sentence describing the gap]
       Action: [One specific course, project, or certification to address it]

    INTERVIEW PREP
    Q1: [Question]
    Talking point: [One sentence drawn from candidate's actual experience]
    Q2: [Question]
    Talking point: [One sentence drawn from candidate's actual experience]
    Q3: [Question]
    Talking point: [One sentence drawn from candidate's actual experience]
    Q4: [Question]
    Talking point: [One sentence drawn from candidate's actual experience]
    Q5: [Question]
    Talking point: [One sentence drawn from candidate's actual experience]

    DO NOT write anything before or after this structure.
  expected_output: >
    A structured gap report with match scores, 5 gaps with actions, and 5 interview questions with talking points.


email_draft_task:
  description: >
    Draft a cold outreach email to a recruiter at "{company}" for the "{role}" position.
    Use all context from previous tasks.

    YOU MUST FOLLOW THESE RULES STRICTLY — NO EXCEPTIONS:
    - The email body must be 80 words or less. Count every word. Stop writing when you hit 80.
    - One subject line only
    - Mention ONE specific fact about {company} from the research — not generic praise
    - State ONE reason the candidate is a strong fit
    - End with ONE simple ask — a call, a chat, a reply

    FORMAT YOUR RESPONSE EXACTLY LIKE THIS:
    Subject: [your subject line here]

    [your email body here — 80 words maximum]

    DO NOT write anything else. No preamble, no explanation, no "here is the email".
  expected_output: >
    A subject line followed by an email body of 80 words or less. Nothing else.